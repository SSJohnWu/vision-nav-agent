<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧導航 - 戶外行動版</title>
    <style>
        body {
            background-color: #000;
            color: #FFEA00;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #videoElement {
            width: 100vw;
            height: 50vh;
            object-fit: cover;
            background-color: #222;
        }
        #btnStart {
            background-color: #FFEA00;
            color: #000;
            font-size: 2.5rem;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 15px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0px 8px 15px rgba(255, 234, 0, 0.4);
        }
        #btnStart:active {
            background-color: #CCBB00;
            transform: scale(0.98);
        }
        #statusText {
            margin-top: 20px;
            font-size: 1.5rem;
            text-align: center;
            padding: 0 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 顯示攝影鏡頭 -->
    <video id="videoElement" autoplay playsinline></video>
    
    <div id="statusText">請按下按鈕以啟動導航 👇</div>
    <button id="btnStart">啟動導航</button>

    <!-- 用來把影片截圖轉為圖片隱藏用的畫布 -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('videoElement');
        const btnStart = document.getElementById('btnStart');
        const statusText = document.getElementById('statusText');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let isRunning = false;
        let isAnalyzing = false;  // 【新增】檢查是否正在等待伺服器回應
        let analyzeInterval = null;

        // 系統內建 TTS 語音發聲
        function speak(text) {
            if ('speechSynthesis' in window) {
                // 如果前一句還沒講完，先打斷它以優先播放緊急最新警告
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                utterance.rate = 1.2;  // 可以講得稍快一點
                window.speechSynthesis.speak(utterance);
            }
        }

        // 請求攝影機權限並啟動
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    // 強制使用後置主鏡頭
                    video: { facingMode: { ideal: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("無法存取攝影機:", err);
                statusText.innerText = "無法存取攝影機，請確認在瀏覽器權限中放行！";
            }
        }

        // 把當前畫面拍下來送到電腦的 API
        async function captureAndAnalyze() {
            // 如果系統暫停，或是上一個運算還沒結束，就不排隊發送新照片！
            if (!isRunning || isAnalyzing) return;
            
            isAnalyzing = true;
            
            // 【優化】將畫面縮短至 320x240，可以大幅降低傳輸時間與 LLM 視覺模組解析的 Token 數量
            canvas.width = 320;
            canvas.height = 240;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 【優化】把 JPG 壓縮比調降到 0.6 減少檔案大小
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            const base64Data = dataUrl.split(',')[1];

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_b64: base64Data })
                });

                // 當收到回應時，如果使用者已經按下了「停止導航」，就直接把這包遲來的結果丟掉！
                if (!isRunning) {
                    isAnalyzing = false;
                    return;
                }

                if (response.ok) {
                    const result = await response.json();
                    if (result.warning) {
                        statusText.innerText = "🗣️ 警告: " + result.warning;
                        speak(result.warning);
                    } else {
                        statusText.innerText = "🟢 前方安全";
                    }
                }
            } catch (err) {
                console.error("上傳大腦分析失敗:", err);
            } finally {
                // 收到回應或出錯後，解鎖讓下一張照片可以發送
                isAnalyzing = false;
            }
        }

        btnStart.addEventListener('click', () => {
            if (!isRunning) {
                isRunning = true;
                btnStart.innerText = "停止導航";
                btnStart.style.backgroundColor = "#ff4444";
                btnStart.style.color = "#fff";
                statusText.innerText = "系統已啟動，環境偵測中...";
                
                speak("導航系統已經啟動");
                startCamera().then(() => {
                    // 每秒偵測一次，但因為上面有了 isAnalyzing 鎖，所以實際上會等算完才拍下一張
                    analyzeInterval = setInterval(captureAndAnalyze, 1000);
                });
            } else {
                isRunning = false;
                btnStart.innerText = "啟動導航";
                btnStart.style.backgroundColor = "#FFEA00";
                btnStart.style.color = "#000";
                statusText.innerText = "系統已暫停";
                clearInterval(analyzeInterval);
                speak("系統已停用");
                
                // 停止相機以省電
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            }
        });
    </script>
</body>
</html>
